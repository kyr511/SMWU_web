<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2416099 강예린</title>
</head>
<body>
    <h1>register.html</h1>
    <h2>동아리 가입 양식</h2>
    <form>
        <label for="name">이름</label>
        <input type="text" id="name" name="name"><br/>

        <label for="department">학부/학과</label>
        <select id="department">
            <option value="컴퓨터과학">소프트웨어학부 컴퓨터과학전공</option>
            <option value="데이터사이언스">소프트웨어학부 데이터사이언스전공</option>
            <option value="경영학부">경영학부</option>
            <option value="경제학부">경제학부</option>
            <option value="미디어학부">미디어학부</option>
        </select><br/>
        
        <label>학년</label> 
        <input type="radio" id="1" name="grade" value="1">
        <label for="1">1학년</label>
        <input type="radio" id="2" name="grade" value="2">
        <label for="2">2학년</label>
        <input type="radio" id="3" name="grade" value="3">
        <label for="3">3학년</label>
        <input type="radio" id="4" name="grade" value="4">
        <label for="4">4학년</label><br/>

        <label for="idnum">학번</label>
        <input type="text" id="idnum" name="idnum"><br/>

        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="id@host"><br/>

        <label for="phone">전화번호</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" placeholder="010-1234-5678"><br/>
        
        <label for="app">가입동기</label>
        <textarea id="app" name="app" rows="3" cols="20"></textarea><br/>

        <input type="submit" value="가입하기">
        <input type="reset" value="취소하기">        
    </form>
</body>
</html>
